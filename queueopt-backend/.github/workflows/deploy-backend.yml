name: Deploy Queue Optimization Web with Docker Compose

on:
  push:
    branches: [main]

jobs:
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH into Server and Deploy Queue Optimization
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 25m
          timeout: 60s
          script: |
            set -euo pipefail

            APP_DIR="/app/queue-api"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # avoid first-time GitHub host prompt
            mkdir -p "$HOME/.ssh"
            touch "$HOME/.ssh/known_hosts"
            grep -q github.com "$HOME/.ssh/known_hosts" || ssh-keyscan -t ed25519 github.com >> "$HOME/.ssh/known_hosts"

            # clone OR pull in one command
            if [ ! -d ".git" ]; if [ ! -d ".git" ]; then git clone --depth 1 -b main https://github.com/sammysamuti/queue_optimization_system_for_restaurants_backend.git .; else git pull origin main; fi

            # build stamp
            mkdir -p build/web
            date +%s > build/web/version.json

            # Recreate .env file
            cat <<EOF > .env
            # Django
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=${{ secrets.DJANGO_DEBUG }}
            DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}

            # Database (Postgres)
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}

            # Redis (cache + Celery broker/result)
            REDIS_URL=${{ secrets.REDIS_URL }}
            CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
            CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}

            # General API metadata
            API_TITLE=${{ secrets.API_TITLE }}
            API_VERSION=${{ secrets.API_VERSION }}

            ACCESS_TOKEN_LIFETIME=${{ secrets.ACCESS_TOKEN_LIFETIME }}
            REFRESH_TOKEN_LIFETIME=${{ secrets.REFRESH_TOKEN_LIFETIME }}

            EOF

            # docker compose v2
            docker compose -f docker-compose.yml down || true
            docker image prune -f || true
            docker builder prune -f || true
            docker compose -f docker-compose.yml build
            docker compose -f docker-compose.yml up -d
