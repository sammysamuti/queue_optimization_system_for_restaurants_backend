name: Deploy queue-api with Docker Compose

on:
  push:
    branches: [main]

jobs:
  deploy-main:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            set -euo pipefail

            APP_DIR="$HOME/queue-api"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Setup SSH keyscan for GitHub
            mkdir -p "$HOME/.ssh"
            touch "$HOME/.ssh/known_hosts"
            ssh-keyscan -t ed25519 github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

            # Pull code
            if [ ! -d ".git" ]; then
              git clone -b main git@github.com:sammysamuti/queue_optimization_system_for_restaurants_backend.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # IMPORTANT: Move into the subfolder where your files actually are
            cd queueopt-backend

            # Create .env inside the subfolder
            cat <<EOF > .env
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=${{ secrets.DJANGO_DEBUG }}
            DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
            CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
            API_TITLE=${{ secrets.API_TITLE }}
            API_VERSION=${{ secrets.API_VERSION }}
            ACCESS_TOKEN_LIFETIME=${{ secrets.ACCESS_TOKEN_LIFETIME }}
            REFRESH_TOKEN_LIFETIME=${{ secrets.REFRESH_TOKEN_LIFETIME }}
            EOF

            # Deployment Sequence
            docker compose down --remove-orphans
            docker image prune -f
            docker compose build --no-cache
            docker compose up -d
